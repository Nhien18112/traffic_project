version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1
  env_file:
    - .env
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - _PIP_ADDITIONAL_REQUIREMENTS=kafka-python requests minio
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    - postgres

services:

  # --- 1. ZOOKEEPER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: traffic_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # --- 2. KAFKA BROKER ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: traffic_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # --- 3. KAFKA UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local_traffic_cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  # --- 4. AIRFLOW DATABASE ---
  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- 5. AIRFLOW INIT ---
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create --role Admin --username admin --password admin --email admin@example.com --firstname Admin --lastname User"

  # --- 6. AIRFLOW WEBSERVER ---
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --- 7. AIRFLOW SCHEDULER ---
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --- 8. MINIO ---
  minio:
    image: minio/minio:latest
    container_name: traffic_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --- 9. MINIO INIT ---
  minio-init:
    image: minio/mc:latest
    container_name: traffic_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/raw-data-lake || true;
      mc anonymous set public myminio/raw-data-lake;
      exit 0;
      "

  # --- 10. SPARK STREAMING PROCESSOR ---
  spark-processor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: traffic_spark_processor
    restart: on-failure
    depends_on:
      - kafka
      - postgres
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  # --- 11. AI WORKER ---
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: traffic_ai_worker
    restart: always
    depends_on:
      - kafka
    volumes:
      - ./src:/app/src
      - ./data:/opt/airflow/data
    command: python /app/src/ai_worker/main.py

  # --- 12. FASTAPI SERVING (MỚI) ---
  api-serving:
    build:
      context: .
      dockerfile: Dockerfile.serving
    container_name: traffic_api_serving
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  # --- 13. WEB UI ---
  web-ui:
    image: nginx:alpine
    container_name: traffic_web_ui
    ports:
      - "3000:80"
    volumes:
      - ./src/serving/index.html:/usr/share/nginx/html/index.html
      - ./src/serving/style.css:/usr/share/nginx/html/style.css
      - ./src/serving/app.js:/usr/share/nginx/html/app.js

volumes:
  postgres_data:
  minio_data: