services:
  # --- 1. KAFKA BROKER (KRaft mode) ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: traffic_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://kafka:19092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init-topics:
    image: apache/kafka:3.7.0
    container_name: traffic_kafka_init_topics
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic camera.raw --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic camera.processed --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic traffic.raw --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic weather.raw --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic traffic.feature --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic traffic.prediction --partitions 1 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic traffic.dlq --partitions 1 --replication-factor 1;
      exit 0;
      "

  # --- 2. KAFKA UI (Quản lý Kafka & Schema Registry) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local_traffic_cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:19092
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy

  # --- 3. CONFLUENT SCHEMA REGISTRY ---
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: traffic_schema_registry
    ports:
      - "8082:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:19092'
    depends_on:
      kafka:
        condition: service_healthy

  # --- 4. MINIO (Data Lakehouse) ---
  minio:
    image: minio/minio:latest
    container_name: traffic_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: traffic_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/raw-data-lake || true;
      mc anonymous set public myminio/raw-data-lake;
      exit 0;
      "

  # --- 5. REDIS (Cache Layer) ---
  redis:
    image: redis:7.2-alpine
    container_name: traffic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # --- 6. PROMETHEUS (Monitoring) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: traffic_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # --- 7. GRAFANA (Dashboard Hệ Thống) ---
  grafana:
    image: grafana/grafana:latest
    container_name: traffic_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - postgres

  # --- 8. ASYNC POLLING SERVICES ---
  polling-services:
    build:
      context: .
      dockerfile: Dockerfile.polling
    container_name: traffic_polling_services
    restart: always
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./src:/app/src
    command: python /app/src/ingestion/main_polling.py

  # --- 9. AI WORKER (Computer Vision Inference) ---
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: traffic_ai_worker
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: python /app/src/ai_worker/main.py

  # --- 10. SPARK STREAMING PROCESSOR (CQRS Feature Pipeline) ---
  spark-processor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: traffic_spark_processor
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      postgres-init-quality:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_STARTING_OFFSETS=earliest
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  # --- 11. MLOPS GRU INFERENCE (Dự đoán thời gian thực) ---
  gru-inference:
    build:
      context: .
      dockerfile: Dockerfile.mlops
    container_name: traffic_gru_inference
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: python /app/src/mlops/gru_inference.py

  # --- 12. PREDICTION SINK (Cắm Dự Báo vào DB) ---
  prediction-sink:
    build:
      context: .
      dockerfile: Dockerfile.polling 
    container_name: traffic_prediction_sink
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    command: python /app/src/streaming/prediction_sink.py

  # --- 13. FASTAPI SERVING (Speed Layer) ---
  api-serving:
    build:
      context: .
      dockerfile: Dockerfile.serving
    container_name: traffic_api_serving
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - postgres

  # --- 14. WEB UI DASHBOARD ---
  web-ui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    container_name: traffic_web_ui
    ports:
      - "3000:80"
    depends_on:
      - api-serving

  # --- 15. LOCAL POSTGRES (self-hosted) ---
  postgres:
    image: postgres:15-alpine
    container_name: traffic_postgres
    restart: always
    environment:
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass
      POSTGRES_DB: trafficdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

  postgres-init-quality:
    image: postgres:15-alpine
    container_name: traffic_postgres_init_quality
    depends_on:
      postgres:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      export PGPASSWORD=traffic_pass;
      psql -h postgres -U traffic_user -d trafficdb -c \"CREATE TABLE IF NOT EXISTS pipeline_quality_metrics (id BIGSERIAL PRIMARY KEY, event_time TIMESTAMPTZ NOT NULL DEFAULT NOW(), pipeline TEXT NOT NULL, epoch_id BIGINT NOT NULL, total_count INTEGER NOT NULL, valid_count INTEGER NOT NULL, invalid_count INTEGER NOT NULL, dropped_count INTEGER NOT NULL, dlq_count INTEGER NOT NULL, rows_written INTEGER NOT NULL);\";
      psql -h postgres -U traffic_user -d trafficdb -c \"CREATE INDEX IF NOT EXISTS idx_pipeline_quality_event_time ON pipeline_quality_metrics (event_time DESC);\";
      psql -h postgres -U traffic_user -d trafficdb -c \"CREATE INDEX IF NOT EXISTS idx_pipeline_quality_pipeline_time ON pipeline_quality_metrics (pipeline, event_time DESC);\";
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
  redis_data: